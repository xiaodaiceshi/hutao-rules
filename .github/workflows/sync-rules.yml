name: 自动同步并编译规则集

on:
  schedule:
    # 每天北京时间 02:00 执行 (UTC 18:00)
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-all-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 初始化 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 安装 mihomo
        run: |
          version=$(curl -sL https://github.com/MetaCubeX/mihomo/releases/download/Prerelease-Alpha/version.txt)
          curl -sL "https://github.com/MetaCubeX/mihomo/releases/download/Prerelease-Alpha/mihomo-linux-amd64-${version}.gz" | \
          gunzip -c > /usr/local/bin/mihomo && chmod +x /usr/local/bin/mihomo

      - name: 创建目录
        run: mkdir -p src/rules/domain src/rules/ip src/rules/game

      # ==================== banAd ====================
      - name: 编译 banAd.mrs
        run: |
          curl -sL "https://raw.githubusercontent.com/8680/GOODBYEADS/master/data/rules/qx.list" -o /tmp/qx.list
          grep -Eo 'DOMAIN,[^,]+' /tmp/qx.list | sed 's/DOMAIN,//' > /tmp/banAd-domain.list
          grep -Eo 'DOMAIN-SUFFIX,[^,]+' /tmp/qx.list | sed 's/DOMAIN-SUFFIX,//' >> /tmp/banAd-domain.list
          echo "payload:" > /tmp/banAd.yaml
          sort -u /tmp/banAd-domain.list | awk '{print " - \x27" $0 "\x27"}' >> /tmp/banAd.yaml
          mihomo convert-ruleset domain yaml /tmp/banAd.yaml src/rules/domain/banAd.mrs
          rm -f /tmp/qx.list /tmp/banAd-domain.list /tmp/banAd.yaml

      # ==================== banAd_mini ====================
      - name: 编译 banAd_mini.mrs
        run: |
          curl -sL "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/meta/geo/geosite/category-ads-all.list" -o /tmp/ads.list
          echo "payload:" > /tmp/banAd_mini.yaml
          head -200 /tmp/ads.list | while IFS= read -r line; do
            trimmed=$(echo "$line" | xargs)
            [[ -z "$trimmed" || "$trimmed" == "#"* ]] && continue
            echo " - '$trimmed'" >> /tmp/banAd_mini.yaml
          done
          mihomo convert-ruleset domain yaml /tmp/banAd_mini.yaml src/rules/domain/banAd_mini.mrs
          rm -f /tmp/ads.list /tmp/banAd_mini.yaml

      # ==================== Emby ====================
      - name: 编译 emby.mrs
        run: |
          curl -sL "https://raw.githubusercontent.com/xiaodaiceshi/hutao-rules/refs/heads/main/src/rules/domain/emby.list" -o /tmp/emby1.list 2>/dev/null || touch /tmp/emby1.list
          curl -sL "https://raw.githubusercontent.com/666OS/YYDS/main/mihomo/rules/emby.list" -o /tmp/emby2.list
          cat /tmp/emby1.list /tmp/emby2.list | grep -v '^#' | grep -v 'IC DR' | sort -u > /tmp/merged_emby.list
          echo "payload:" > /tmp/emby.yaml
          while IFS=, read -r type value; do
            if [[ -n "$type" && -n "$value" ]]; then
              if [[ "$type" == "DOMAIN" ]]; then echo " - $value" >> /tmp/emby.yaml
              elif [[ "$type" == "DOMAIN-SUFFIX" ]]; then echo " - '*.$value'" >> /tmp/emby.yaml; fi
            fi
          done < /tmp/merged_emby.list
          mihomo convert-ruleset domain yaml /tmp/emby.yaml src/rules/domain/emby.mrs
          rm -f /tmp/emby1.list /tmp/emby2.list /tmp/merged_emby.list /tmp/emby.yaml

      # ==================== Emby IP ====================
      - name: 编译 emby-ip.mrs
        run: |
          echo "payload:" > /tmp/emby-ip.yaml
          echo " - '0.0.0.0/0'" >> /tmp/emby-ip.yaml
          mihomo convert-ruleset ipcidr yaml /tmp/emby-ip.yaml src/rules/ip/emby-ip.mrs
          rm -f /tmp/emby-ip.yaml

      # ==================== AI ====================
      - name: 编译 ai.mrs
        run: |
          curl -sL "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/meta/geo/geosite/category-ai-!cn.list" -o /tmp/ai.list 2>/dev/null || true
          echo "payload:" > /tmp/ai.yaml
          if [ -s /tmp/ai.list ]; then
            grep -v '^#' /tmp/ai.list | while IFS=, read -r line; do
              trimmed=$(echo "$line" | xargs)
              if [[ -n "$trimmed" ]]; then
                if [[ "$trimmed" == .* ]]; then echo " - '*$(echo "$trimmed" | sed "s/^\.//")'" >> /tmp/ai.yaml
                else echo " - '$trimmed'" >> /tmp/ai.yaml; fi
              fi
            done
          fi
          mihomo convert-ruleset domain yaml /tmp/ai.yaml src/rules/domain/ai.mrs
          rm -f /tmp/ai.list /tmp/ai.yaml

      # ==================== Google ====================
      - name: 编译 google.mrs
        run: |
          curl -sL "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/meta/geo/geosite/google.list" -o /tmp/google.list
          echo "payload:" > /tmp/google.yaml
          grep -v '^#' /tmp/google.list | while IFS=, read -r line; do
            trimmed=$(echo "$line" | xargs)
            if [[ -n "$trimmed" ]]; then
              if [[ "$trimmed" == .* ]]; then echo " - '*$(echo "$trimmed" | sed "s/^\.//")'" >> /tmp/google.yaml
              else echo " - '$trimmed'" >> /tmp/google.yaml; fi
            fi
          done
          mihomo convert-ruleset domain yaml /tmp/google.yaml src/rules/domain/google.mrs
          rm -f /tmp/google.list /tmp/google.yaml

      # ==================== GoogleVPN ====================
      - name: 编译 googleVPN.mrs
        run: |
          echo "payload:" > /tmp/googleVPN.yaml
          cat >> /tmp/googleVPN.yaml << 'EOF'
           - '*.googleapis.com'
           - '*.gstatic.com'
           - '*.google.com'
          EOF
          mihomo convert-ruleset domain yaml /tmp/googleVPN.yaml src/rules/domain/googleVPN.mrs
          rm -f /tmp/googleVPN.yaml

      # ==================== WeChat ====================
      - name: 编译 WeChat.mrs
        run: |
          curl -sL "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/meta/geo/geosite/wechat.list" -o /tmp/wechat.list
          echo "payload:" > /tmp/wechat.yaml
          grep -v '^#' /tmp/wechat.list | while IFS=, read -r line; do
            trimmed=$(echo "$line" | xargs)
            if [[ -n "$trimmed" ]]; then echo " - '$trimmed'" >> /tmp/wechat.yaml; fi
          done
          mihomo convert-ruleset domain yaml /tmp/wechat.yaml src/rules/domain/WeChat.mrs
          rm -f /tmp/wechat.list /tmp/wechat.yaml

      # ==================== 从内部 .yaml 源文件编译所有规则 ====================
      - name: 从内部源文件编译 domain/.mrs
        run: |
          for f in src/rules/domain/*.yaml; do
            [ -f "$f" ] || continue
            base=$(basename "$f" .yaml)
            echo "📦 编译 domain/$base.mrs"
            mihomo convert-ruleset domain yaml "$f" "src/rules/domain/$base.mrs"
          done

      - name: 从内部源文件编译 IP/.mrs
        run: |
          for f in src/rules/ip/*.yaml; do
            [ -f "$f" ] || continue
            base=$(basename "$f" .yaml)
            echo "📦 编译 ip/$base.mrs"
            mihomo convert-ruleset ipcidr yaml "$f" "src/rules/ip/$base.mrs"
          done

      # ==================== Game (from SSTap-Rule) ====================
      - name: 拉取游戏规则
        run: |
          mkdir -p /tmp/game_src
          git clone --depth=1 --filter=blob:none --sparse https://github.com/FQrabbit/SSTap-Rule.git /tmp/game_repo
          cd /tmp/game_repo
          git sparse-checkout set rules
          cp -r rules/* /tmp/game_src/ 2>/dev/null || true
          cd -
          rm -rf /tmp/game_repo
          mkdir -p src/rules/game
          if ls /tmp/game_src/*.rules 1>/dev/null 2>&1; then
            for f in /tmp/game_src/*.rules; do
              base=$(basename "$f" .rules)
              grep -v '^#' "$f" | head -100 > "src/rules/game/${base}.list" 2>/dev/null || true
            done
          fi
          rm -rf /tmp/game_src

      # ==================== 提交所有变更 ====================
      - name: 提交并推送
        run: |
          git add src/rules/domain/*.mrs src/rules/ip/*.mrs src/rules/game/*.list 2>/dev/null || true
          git commit -m "Auto update all rule sets ($(date -u +%Y-%m-%d))" || echo "无变更，跳过提交"
          git push
