# Hutao 完整版配置（无广告拦截）
# 适用于 Mihomo / Stash 客户端

port: 7890
socks-port: 7891
mixed-port: 7892
allow-lan: true
bind-address: "0.0.0.0"
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090

# 代理节点  — 在此添加你的节点配置
proxies:

# 代理分组
proxy-groups:
  - name: Proxy
    type: select
    proxies:
      - Auto

  - name: Auto
    type: url-test
    proxies:
    url: "http://www.gstatic.com/generate_204"
    interval: 300

rules:
  # 局域网放行
  - "MATCH,Proxy"
