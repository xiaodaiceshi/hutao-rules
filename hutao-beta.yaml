# Hutao 测试版配置
# 适用于 Mihomo / Stash 客户端
# 本版本为开发中功能预览

port: 7890
socks-port: 7891
mixed-port: 7892
allow-lan: true
mode: rule
log-level: debug
ipv6: false

proxies:

proxy-groups:
  - name: Proxy
    type: select
    proxies:
      - Auto

  - name: Auto
    type: url-test
    proxies:
    url: "http://www.gstatic.com/generate_204"
    interval: 300

rules:
  - "MATCH,Proxy"
